services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      # Alle Daten (SQLite-DB, Uploads, Session-Secret) — regelmäßig sichern!
      - ./data:/app/data
    environment:
      # Öffentliche Adresse (für Links in E-Mails)
      - APP_URL=https://${DOMAIN:-localhost}
      # E-Mail-Versand (optional): ohne SMTP_HOST werden keine E-Mails gesendet
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-}

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Domain in der Datei .env setzen (siehe .env.example)
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
