services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      # Alle Daten (SQLite-DB, Uploads, Session-Secret) — regelmäßig sichern!
      - ./data:/app/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Domain in der Datei .env setzen (siehe .env.example)
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
